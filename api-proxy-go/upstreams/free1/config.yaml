name: "free1"
address: "https://openrouter.ai/api"
api_key: ""  # 从环境变量 OPENROUTER_API_KEY 加载
enabled: true
default_weight: 120

# 限额配置（根据实际情况调整）
limit:
  hourly: 1000
  daily: 5000
  monthly: 100000

# 阈值配置
thresholds:
  warning: 80
  critical: 95

# 代理配置
use_proxy: true
use_sdk: false

# 模型配置
model: "openrouter/free"
available_models: []
use_weighted_model: false

# 响应格式配置
response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

# 最大 token 数
max_tokens: 2000
