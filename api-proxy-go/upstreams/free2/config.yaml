name: "free2"
address: "https://api.chatanywhere.tech"
api_key: "REVOKED_KEY"
enabled: true
default_weight: 15

# 限额配置（根据实际情况调整）
limit:
  hourly: 1000
  daily: 5000
  monthly: 100000

# 阈值配置
thresholds:
  warning: 80
  critical: 95

# 代理配置
use_proxy: false
use_sdk: false

# 模型配置
model: "gpt-3.5-turbo"
available_models: []
use_weighted_model: false

# 响应格式配置
response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

# 最大 token 数
max_tokens: 2000
