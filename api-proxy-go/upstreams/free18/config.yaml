name: "free18"
address: "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key: "${GEMINI_API_KEY}"
enabled: false
default_weight: 60

limit:
  hourly: 500
  daily: 3000
  monthly: 10000

thresholds:
  warning: 80
  critical: 95

use_proxy: true
use_sdk: false

model: "gemini-2.0-flash"
available_models:
  - "gemini-2.0-flash"
  - "gemini-2.0-flash-lite"
  - "gemini-1.5-pro"
  - "gemini-1.5-flash"
use_weighted_model: false

response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

max_tokens: 8192
