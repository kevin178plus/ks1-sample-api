name: "free8"
address: "https://api.friendli.ai/serverless/v1"
api_key: "None"
enabled: false
default_weight: 10

# 限额配置（根据实际情况调整）
limit:
  hourly: 1000
  daily: 5000
  monthly: 100000

# 阈值配置
thresholds:
  warning: 80
  critical: 95

# 代理配置
use_proxy: false
use_sdk: true

# 模型配置
model: "Qwen/Qwen3-235B-A22B-Instruct-2507"
available_models: []
use_weighted_model: false

# 响应格式配置
response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

# 最大 token 数
max_tokens: 2000
