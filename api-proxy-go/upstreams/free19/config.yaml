name: "free19"
address: "https://api.cohere.com/v2"
api_key: ""  # 从环境变量 COHERE_API_KEY 加载
enabled: true
default_weight: 50

limit:
  hourly: 500
  daily: 3000
  monthly: 10000

thresholds:
  warning: 80
  critical: 95

use_proxy: true
use_sdk: false

model: "command-a-03-2025"
available_models:
  - "command-a-03-2025"
  - "command-r-plus-08-2024"
  - "command-r-08-2024"
use_weighted_model: false

response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

max_tokens: 4096

# 注意: Cohere API响应格式与标准OpenAI不同，需要自定义解析器
# 当前标记为disabled，待实现content_extractor功能后再启用
