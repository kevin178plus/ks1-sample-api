name: "free16"
address: "https://api.sambanova.ai/v1"
api_key: ""  # 从环境变量 SAMBANOVA_API_KEY 加载
enabled: true
default_weight: 80

limit:
  hourly: 500
  daily: 3000
  monthly: 10000

thresholds:
  warning: 80
  critical: 95

use_proxy: false
use_sdk: false

model: "DeepSeek-V3.1"
available_models:
  - "DeepSeek-V3.1"
  - "DeepSeek-V3"
  - "Llama-3.2-90B-Vision-Instruct"
use_weighted_model: false

response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

max_tokens: 4096
