name: "free17"
address: "https://api.cerebras.ai/v1"
api_key: "${CEREBRAS_API_KEY}"
enabled: false
default_weight: 50

limit:
  hourly: 500
  daily: 3000
  monthly: 10000

thresholds:
  warning: 80
  critical: 95

use_proxy: true
use_sdk: true

model: "llama3.1-8b"
available_models:
  - "llama3.1-8b"
  - "llama3.1-70b"
use_weighted_model: false

response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

max_tokens: 8192

# 注意: SDK模式暂未在Go版本中实现
