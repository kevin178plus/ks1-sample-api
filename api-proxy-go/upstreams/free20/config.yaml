name: "free20"
address: "https://api.longcat.chat/openai"
api_key: ""  # 从环境变量 LONGCAT_API_KEY 加载
enabled: true
default_weight: 100

# 限额配置（根据实际情况调整）
limit:
  hourly: 2000
  daily: 10000
  monthly: 50000

# 阈值配置
thresholds:
  warning: 80
  critical: 95

# 代理配置
use_proxy: false
use_sdk: false

# 模型配置
model: "LongCat-Flash-Chat"
available_models:
  - "LongCat-Flash-Chat"        # 高性能通用对话模型
  - "LongCat-Flash-Thinking"    # 深度思考模型（已升级至 2601）
  - "LongCat-Flash-Thinking-2601" # 升级版深度思考模型
  - "LongCat-Flash-Lite"        # 高效轻量化MoE模型
  - "LongCat-Flash-Omni-2603"   # 多模态模型
  - "LongCat-Flash-Chat-2602-Exp" # 高性能通用对话模型
  - "LongCat-2.0-Preview"       # 高性能Agentic模型
use_weighted_model: false

# 响应格式配置
response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

# 最大 token 数
max_tokens: 2000
