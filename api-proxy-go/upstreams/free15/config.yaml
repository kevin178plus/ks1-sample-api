name: "free15"
address: "https://api.groq.com/openai/v1"
api_key: "${GROQ_API_KEY}"
enabled: true
default_weight: 80

limit:
  hourly: 500
  daily: 3000
  monthly: 10000

thresholds:
  warning: 80
  critical: 95

use_proxy: true
use_sdk: false

model: "llama-3.3-70b-versatile"
available_models:
  - "llama-3.3-70b-versatile"
  - "llama-3.1-70b-versatile"
  - "llama-3.1-8b-instant"
  - "mixtral-8x7b-32768"
use_weighted_model: false

response_format:
  content_fields: ['content']
  merge_fields: false
  use_reasoning_as_fallback: false

max_tokens: 8192
