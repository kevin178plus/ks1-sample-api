server {
    listen 80;
    server_name your-server.com;  # 替换为你的域名或IP
    
    # 文档根目录
    root /var/www/html;
    index index.html index.php;
    
    # 字符集
    charset utf-8;
    
    # 访问日志
    access_log /var/log/nginx/documents_access.log;
    error_log /var/log/nginx/documents_error.log;
    
    # 主配置
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # 文档目录访问
    location /documents/ {
        alias /var/www/html/documents/;
        autoindex off;
        
        # 添加访问日志
        access_log /var/log/nginx/documents_access.log documents;
        
        # 防止直接访问 PHP 文件
        location ~* \.php$ {
            deny all;
        }
    }
    
    # API 路由
    location /api/ {
        alias /var/www/html/api/;
        try_files $uri $uri/ /api/upload.php?$query_string;
    }
    
    # 安全设置
    location ~ /\. {
        deny all;
    }
    
    # 限制上传大小
    client_max_body_size 10M;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}